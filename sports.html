<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sports Federation | Colombian Empire</title>
    <link rel="icon" type="image/x-icon" href="/Untitled design (3).png">
    <style>
        /* Updated styles for consistent look and interactivity */
        body { background-color: #05070a; color: #f1f5f9; font-family: 'Times New Roman', serif; margin: 0; padding: 40px; }
        .header { text-align: center; margin-bottom: 50px; position: relative; }
        
        .back-btn { 
            position: absolute; left: 0; top: 0; color: #ffc837; text-decoration: none; 
            border: 1px solid #ffc837; padding: 8px 16px; border-radius: 4px; transition: 0.3s;
        }
        .back-btn:hover { background: #ffc837; color: #000; }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 2rem; max-width: 1200px; margin: 0 auto; }
        
        .card { 
            background-color: #111622; border: 1px solid #ffc837; padding: 2rem; 
            text-align: center; border-radius: 4px; transition: 0.3s ease; 
        }
        
        /* Glow Effect on Hover */
        .card:hover { transform: translateY(-5px); box-shadow: 0 0 15px #ffc837; }
        
        /* Uniform Image Size */
        .card img { width: 150px; height: 150px; object-fit: contain; margin-bottom: 1rem; }
        
        .card h3 { color: #fff; margin-bottom: 0.5rem; letter-spacing: 1px; }
        .card p { color: #8898aa; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="header">
        <a href="index.html" class="back-btn">← Back Home</a>
        <h1>Colombian Empire Sports Federation</h1>
    </div>
    <div class="grid">
        <div class="card">
            <img src="02ba30729eef459488bbc1bffd4c0425.png" alt="Logo">
            <h3>Pijao Jaguars</h3>
            <p>Professional Hockey Club</p>
        </div>
        <div class="card">
            <img src="image_2026-07-07_195516790-removebg-preview.png" alt="Logo">
            <h3>Andean Titans</h3>
            <p>National Elite Hockey</p>
        </div>
        <div class="card">
            <img src="Untitled design (3).png" alt="Logo">
            <h3>The Gold Legion</h3>
            <p>National Soccer Team</p>
        </div>
    </div>
</body>
</html>

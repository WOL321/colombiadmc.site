<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Colombian Empire | DiplomaticaMC</title>
    <link rel="icon" type="image/x-icon" href="Untitled design (3).png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #05070a;
            --bg-surface: #0b0e14;
            --bg-card: #111622;
            --text-primary: #f1f5f9;
            --text-muted: #8898aa;
            --imperial-gold: #ffc837;
            --colombia-blue: #1d4ed8;
            --colombia-red: #dc2626;
            --font-heading: 'Cinzel', serif;
            --font-body: 'Plus Jakarta Sans', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; }
        body { background-color: var(--bg-main); color: var(--text-primary); font-family: var(--font-body); line-height: 1.6; }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 2rem; }
        .section { padding: 6rem 0; }
        .bg-alt { background-color: var(--bg-surface); }
        
        /* Strict Alignment Grids */
        .grid { display: grid; gap: 2rem; }
        .grid-2 { grid-template-columns: repeat(2, 1fr); }
        .grid-3 { grid-template-columns: repeat(3, 1fr); }
        
        .center-header { text-align: center; margin-bottom: 4rem; }
        .sub-title { color: var(--imperial-gold); text-transform: uppercase; letter-spacing: 4px; font-size: 0.85rem; font-weight: 700; display: block; margin-bottom: 0.5rem; }
        .section-title { font-family: var(--font-heading); font-size: 3rem; font-weight: 900; margin-bottom: 1rem; letter-spacing: 1px; }
        .section-desc { color: var(--text-muted); max-width: 700px; margin: 0 auto; font-size: 1.1rem; }

        /* Navigation */
        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 2rem 4rem; position: absolute; width: 100%; z-index: 10; }
        .nav-brand { display: flex; align-items: center; gap: 1rem; }
        .nav-logo-img { height: 40px; width: auto; object-fit: contain; }
        .nav-logo { font-family: var(--font-heading); font-weight: 900; font-size: 1.4rem; letter-spacing: 2px; color: var(--imperial-gold); }
        .nav-links { display: flex; list-style: none; gap: 2.5rem; }
        .nav-links a { color: var(--text-primary); text-decoration: none; font-size: 0.85rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; transition: color 0.2s; }
        .nav-links a:hover { color: var(--imperial-gold); }

        /* Hero */
        .hero { height: 100vh; display: flex; align-items: center; justify-content: center; position: relative; text-align: center; background: radial-gradient(circle at center, #0f172a 0%, #030508 100%); }
        .hero-overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: linear-gradient(to bottom, transparent 50%, var(--bg-main)); }
        .hero-content { position: relative; z-index: 2; max-width: 950px; padding: 0 2rem; display: flex; flex-direction: column; align-items: center; }
        .hero-flag { height: 120px; width: auto; margin-bottom: 2rem; box-shadow: 0 10px 25px rgba(0,0,0,0.5); border-radius: 2px; }
        .hero h1 { font-family: var(--font-heading); font-size: 5rem; font-weight: 900; line-height: 1.1; margin-bottom: 1.5rem; letter-spacing: 2px; }
        .hero p { font-size: 1.4rem; color: var(--text-muted); margin-bottom: 3.5rem; max-width: 800px; }

        /* Buttons */
        .btn { display: inline-block; padding: 1.2rem 3rem; font-weight: 700; text-transform: uppercase; font-size: 0.85rem; letter-spacing: 2px; text-decoration: none; border-radius: 2px; transition: all 0.2s ease; }
        .btn:hover { transform: translateY(-2px); }
        .btn-primary { background-color: var(--imperial-gold); color: #000; box-shadow: 0 4px 15px rgba(255, 200, 55, 0.2); }
        .btn-primary:hover { background-color: #ffd254; box-shadow: 0 0 20px rgba(255, 200, 55, 0.6); transform: translateY(-4px); }
        .btn-secondary { border: 1px solid rgba(255,255,255,0.15); color: var(--text-primary); margin-left: 1.5rem; }
        .btn-secondary:hover { background: rgba(255,255,255,0.05); border-color: #fff; }

        /* Animations Added Here */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .section { animation: fadeInUp 0.8s ease-out forwards; }

        /* Existing Styles continue... */
        .pijao-showcase { display: grid; grid-template-columns: 1fr 1fr; gap: 4rem; align-items: center; }
        /* ... (rest of your existing styles) ... */

        @media (max-width: 950px) {
            .navbar { padding: 1.5rem; }
            .nav-links { display: none; }
            .hero h1 { font-size: 3.2rem; }
            .pijao-showcase, .grid-2, .grid-3 { grid-template-columns: 1fr; gap: 2rem; }
            .btn-secondary { margin-left: 0; margin-top: 1rem; display: block; }
        }
    </style>
</head>
<!-- ... rest of your body content ... -->

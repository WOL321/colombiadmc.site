<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barbados Gallery | Colombian Empire</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg-main: #05070a; --bg-surface: #0b0e14; --bg-card: #111622; --text-primary: #f1f5f9; --text-muted: #8898aa; --imperial-gold: #ffc837; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: var(--bg-main); color: var(--text-primary); font-family: 'Plus Jakarta Sans', sans-serif; padding: 6rem 2rem; }
        .container { max-width: 1200px; margin: 0 auto; }
        .back-link { color: var(--imperial-gold); text-decoration: none; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; font-size: 0.85rem; display: inline-block; margin-bottom: 2rem; }
        h1 { font-family: 'Cinzel', serif; font-size: 3.5rem; font-weight: 900; margin-bottom: 1rem; color: #fff; letter-spacing: 1px; }
        .desc { color: var(--text-muted); font-size: 1.2rem; margin-bottom: 4rem; max-width: 700px; }
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(450px, 1fr)); gap: 2.5rem; }
        .gallery-item { background: var(--bg-card); border: 1px solid rgba(255,255,255,0.02); border-radius: 4px; overflow: hidden; box-shadow: 0 15px 30px rgba(0,0,0,0.5); }
        .gallery-item img { width: 100%; display: block; height: auto; }
        .caption { padding: 1.2rem; font-size: 0.9rem; color: var(--text-muted); font-weight: 600; border-top: 1px solid rgba(255,255,255,0.02); }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-link">← Return to Empire Home</a>
        <h1>Barbados Architectural Record</h1>
        <p class="desc">Official photographic log of our sovereign maritime Caribbean outpost.</p>

    </div>
</body>
</html>
